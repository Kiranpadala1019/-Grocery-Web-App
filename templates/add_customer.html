{% extends "base.html" %}


{% block title %}
Add Customer
{% endblock %}



{% block content %}


<div class="container mt-4">


    <h2 class="mb-4">
        ➕ Add Customer
    </h2>



    <form method="POST">


        <div class="mb-3">

            <label class="form-label">
                Name
            </label>

            <input type="text"
                   name="name"
                   class="form-control"
                   placeholder="Enter customer name"
                   required>

        </div>




        <div class="mb-3">

            <label class="form-label">
                Phone
            </label>

            <input type="text"
                   name="phone"
                   class="form-control"
                   placeholder="Enter phone number"
                   required>

        </div>




        <div class="mb-3">

            <label class="form-label">
                Email
            </label>

            <input type="email"
                   name="email"
                   class="form-control"
                   placeholder="Enter email">

        </div>




        <div class="mb-3">

            <label class="form-label">
                Address
            </label>

            <textarea name="address"
                      class="form-control"
                      placeholder="Enter address"></textarea>

        </div>




        <button type="submit"
                class="btn btn-success">

            💾 Save Customer

        </button>



        <a href="{{ url_for('customers') }}"
           class="btn btn-secondary">

            ⬅ Back

        </a>



    </form>


</div>


{% endblock %}
