<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <div class="card mx-auto" style="max-width:400px;">

        <div class="card-body">

            <h3 class="text-center mb-4">
                🔐 Admin Login
            </h3>

            <form method="POST">

                <div class="mb-3">
                    <input type="text"
                           name="username"
                           class="form-control"
                           placeholder="Username"
                           required>
                </div>

                <div class="mb-3">
                    <input type="password"
                           name="password"
                           class="form-control"
                           placeholder="Password"
                           required>
                </div>

                <button type="submit"
                        class="btn btn-success w-100">
                    Login
                </button>

            </form>

            <div class="text-center mt-3">
                <a href="/register">
                    Create New Account
                </a>
            </div>

        </div>

    </div>

</div>

</body>
</html>
